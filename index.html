<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Hair Cutout</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" />
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "@mediapipe/tasks-vision": "/node_modules/@mediapipe/tasks-vision/vision_bundle.mjs"
        }
      }
    </script>
  </head>
  <body>
    <main class="app">
      <section class="workspace">
        <div class="toolbar">
          <label class="model-field">
            <input id="model" type="url" placeholder="Segmenter model URL" />
            <a
              class="model-help"
              href="https://developers.google.com/edge/mediapipe/solutions/vision/image_segmenter#models"
              target="_blank"
              rel="noreferrer"
            >
              MediaPipe image segmenter models
            </a>
          </label>
          <input id="file" type="file" accept="image/*" />
          <button id="run" type="button" disabled>Cut out</button>
          <a id="download" hidden download="cutout.png">Download PNG</a>
        </div>
        <div class="panes">
          <figure>
            <figcaption>Source</figcaption>
            <canvas id="source"></canvas>
          </figure>
          <figure>
            <figcaption>Transparent PNG</figcaption>
            <canvas id="result"></canvas>
          </figure>
        </div>
        <p id="status" role="status"></p>
      </section>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
